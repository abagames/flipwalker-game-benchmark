<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gravity Flip Puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Gravity Flip Puzzle</h1>
  <p>Press Space or click/tap to flip gravity. Collect the key and reach the door.</p>
  <div class="controls">
    <button id="simulateBtn">Auto-solve (demo)</button>
    <button id="resetBtn">Reset</button>
    <span id="status"></span>
  </div>
  <canvas id="game" width="800" height="400"></canvas>
  <div id="hud"></div>
  <script src="src/game.js"></script>
  <script src="src/renderer.js"></script>
</body>
</html>
