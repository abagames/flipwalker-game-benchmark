<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gravity Flip</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 12px;
      background: #0a0a14;
      color: #d8d8e8;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      letter-spacing: 2px;
      color: #9ac6ff;
    }
    .subtitle {
      margin: 0 0 14px;
      font-size: 13px;
      color: #8088a0;
    }
    #game {
      display: block;
      border: 2px solid #30365a;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(100, 160, 255, 0.12);
      image-rendering: pixelated;
    }
    .status-bar {
      margin-top: 12px;
      display: flex;
      gap: 24px;
      font-size: 14px;
    }
    .status-bar span.label { color: #8088a0; }
    .status-bar .ok { color: #7fe08f; }
    .status-bar .bad { color: #ff7070; }
    .status-bar .hint { color: #f0c060; }
    .controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #1a1f38;
      border: 1px solid #3a436a;
      color: #d8d8e8;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.12s;
    }
    button:hover { background: #232a48; }
    button:active { background: #2a3158; }
    .help {
      margin-top: 18px;
      font-size: 12px;
      color: #6a7290;
      max-width: 720px;
      text-align: center;
      line-height: 1.7;
    }
    kbd {
      background: #1a1f38;
      border: 1px solid #3a436a;
      padding: 1px 6px;
      border-radius: 3px;
      color: #c0c8e0;
      font-family: inherit;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>GRAVITY FLIP</h1>
  <p class="subtitle">The hero walks on their own. All you can do is flip gravity.</p>
  <canvas id="game"></canvas>
  <div class="status-bar">
    <div><span class="label">Key:</span> <span id="keyStatus" class="bad">missing</span></div>
    <div><span class="label">Status:</span> <span id="msg" class="hint">walk…</span></div>
    <div><span class="label">Flips:</span> <span id="flipCount">0</span></div>
  </div>
  <div class="controls">
    <button onclick="doReset()">Reset (R)</button>
    <button onclick="playSolution()">Auto-Play Solution</button>
  </div>
  <p class="help">
    <kbd>SPACE</kbd> / <kbd>↑</kbd> / <kbd>↓</kbd> to flip gravity (only while standing on a surface).
    <kbd>R</kbd> to reset. Grab the key, then reach the door. Spikes are deadly.
  </p>

  <script src="game-core.js"></script>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = W * T;
    canvas.height = H * T;

    let player = newPlayer();
    let frame = 0;
    let flipCount = 0;
    let autoFlipSchedule = null; // Set of frame numbers for auto-play
    let autoFlipStart = 0;

    const msgEl = document.getElementById('msg');
    const keyEl = document.getElementById('keyStatus');
    const flipCountEl = document.getElementById('flipCount');

    function doReset() {
      player = newPlayer();
      frame = 0;
      flipCount = 0;
      autoFlipSchedule = null;
      updateUI();
    }

    function playSolution() {
      doReset();
      // Flip frames verified to solve the level (up, down, up).
      autoFlipSchedule = new Set([60, 260, 300]);
      autoFlipStart = frame;
    }

    function flip() {
      if (tryFlip(player)) {
        flipCount++;
        updateUI();
      }
    }

    function updateUI() {
      keyEl.textContent = player.hasKey ? 'collected' : 'missing';
      keyEl.className = player.hasKey ? 'ok' : 'bad';
      flipCountEl.textContent = flipCount;
      if (player.won) {
        msgEl.textContent = 'YOU WIN!';
        msgEl.className = 'ok';
      } else if (!player.alive) {
        msgEl.textContent = 'died — press R';
        msgEl.className = 'bad';
      } else if (player.hasKey) {
        msgEl.textContent = 'go to the door';
        msgEl.className = 'hint';
      } else {
        msgEl.textContent = 'find the key';
        msgEl.className = 'hint';
      }
    }

    // Rendering helpers
    function drawTile(x, y, tile) {
      const px = x * T, py = y * T;
      if (tile === '#') {
        ctx.fillStyle = '#2a2f55';
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#3a4378';
        ctx.fillRect(px + 1, py + 1, T - 2, T - 2);
        ctx.fillStyle = '#545d9a';
        ctx.fillRect(px + 3, py + 3, T - 6, T - 6);
        ctx.fillStyle = '#3a4378';
        ctx.fillRect(px + 6, py + 6, T - 12, T - 12);
      } else if (tile === '^') {
        ctx.fillStyle = '#5a1218';
        ctx.fillRect(px, py + T - 4, T, 4);
        ctx.fillStyle = '#e04050';
        ctx.beginPath();
        ctx.moveTo(px + 2, py + T - 2);
        ctx.lineTo(px + T / 2, py + 4);
        ctx.lineTo(px + T - 2, py + T - 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ff8088';
        ctx.beginPath();
        ctx.moveTo(px + T / 2 - 3, py + 10);
        ctx.lineTo(px + T / 2, py + 4);
        ctx.lineTo(px + T / 2 + 3, py + 10);
        ctx.closePath();
        ctx.fill();
      } else if (tile === 'v') {
        ctx.fillStyle = '#5a1218';
        ctx.fillRect(px, py, T, 4);
        ctx.fillStyle = '#e04050';
        ctx.beginPath();
        ctx.moveTo(px + 2, py + 2);
        ctx.lineTo(px + T / 2, py + T - 4);
        ctx.lineTo(px + T - 2, py + 2);
        ctx.closePath();
        ctx.fill();
      } else if (tile === 'K') {
        if (!player.hasKey) {
          const t = frame * 0.08;
          const bob = Math.sin(t) * 3;
          ctx.save();
          ctx.translate(px + T / 2, py + T / 2 + bob);
          // glow
          ctx.fillStyle = 'rgba(255, 220, 80, 0.15)';
          ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255, 220, 80, 0.25)';
          ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
          // key head
          ctx.fillStyle = '#ffe040';
          ctx.beginPath(); ctx.arc(0, -4, 5, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#1a1f38';
          ctx.beginPath(); ctx.arc(0, -4, 2, 0, Math.PI * 2); ctx.fill();
          // shaft
          ctx.fillStyle = '#ffe040';
          ctx.fillRect(-1.5, 0, 3, 9);
          ctx.fillRect(1.5, 5, 3, 2);
          ctx.fillRect(1.5, 8, 4, 2);
          ctx.restore();
        }
      } else if (tile === 'D') {
        ctx.fillStyle = '#1a4028';
        ctx.fillRect(px + 3, py + 1, T - 6, T - 1);
        ctx.fillStyle = player.hasKey ? '#4ec870' : '#306a46';
        ctx.fillRect(px + 5, py + 3, T - 10, T - 4);
        ctx.fillStyle = '#ffe040';
        ctx.fillRect(px + T - 10, py + T / 2 - 1, 3, 3);
        if (player.hasKey) {
          // sparkle
          const t = frame * 0.2;
          ctx.fillStyle = `rgba(255,255,200,${0.3 + 0.3 * Math.sin(t)})`;
          ctx.fillRect(px + 6, py + 5, T - 12, 2);
        }
      }
    }

    function drawPlayer() {
      const p = player;
      const alpha = p.alive ? 1 : 0.4;
      ctx.save();
      ctx.globalAlpha = alpha;

      // trail / motion blur hint
      if (p.alive && !p.won) {
        ctx.fillStyle = 'rgba(120, 200, 255, 0.15)';
        ctx.fillRect(p.x - p.vx, p.y, PW, PH);
      }

      // body
      ctx.fillStyle = p.won ? '#90f0a0' : (p.alive ? '#78c8ff' : '#707080');
      ctx.fillRect(p.x, p.y, PW, PH);
      ctx.fillStyle = p.won ? '#c0f8d0' : (p.alive ? '#a8e0ff' : '#8a8a98');
      ctx.fillRect(p.x + 2, p.y + 2, PW - 4, PH - 4);

      // eyes — positioned according to gravity direction
      const eyeY = p.gravity === 1 ? p.y + 5 : p.y + PH - 10;
      const eyeDirX = p.vx > 0 ? 1 : -1;
      ctx.fillStyle = '#1a1f38';
      ctx.fillRect(p.x + 4, eyeY, 3, 4);
      ctx.fillRect(p.x + PW - 7, eyeY, 3, 4);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(p.x + 4 + (eyeDirX > 0 ? 1 : 0), eyeY + 1, 1, 1);
      ctx.fillRect(p.x + PW - 7 + (eyeDirX > 0 ? 1 : 0), eyeY + 1, 1, 1);

      // feet marker (small dot at surface side) to show grounded state
      if (p.onSurface) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        const footY = p.gravity === 1 ? p.y + PH - 1 : p.y;
        ctx.fillRect(p.x + 4, footY, PW - 8, 1);
      }
      ctx.restore();
    }

    function render() {
      // background gradient
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, '#0f1530');
      g.addColorStop(1, '#0a0d1c');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // subtle gravity-direction tint
      if (player.gravity === -1 && player.alive) {
        ctx.fillStyle = 'rgba(200, 160, 255, 0.04)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const tile = LEVEL[y][x];
          if (tile === ' ' || tile === 'P') continue;
          drawTile(x, y, tile);
        }
      }
      drawPlayer();
    }

    function loop() {
      // Auto-play: fire scheduled flip for this frame
      if (autoFlipSchedule && autoFlipSchedule.has(frame - autoFlipStart)) {
        flip();
      }
      step(player);
      updateUI();
      render();
      frame++;
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.code === 'Space') {
        e.preventDefault();
        flip();
      } else if (e.key === 'r' || e.key === 'R') {
        doReset();
      }
    });

    updateUI();
    loop();
  </script>
</body>
</html>
