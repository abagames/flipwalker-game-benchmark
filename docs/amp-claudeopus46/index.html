<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  canvas {
    border: 2px solid #334;
    image-rendering: pixelated;
    display: block;
  }
  #hud {
    display: flex;
    gap: 28px;
    font-size: 13px;
    color: #889;
  }
  #hud .val { color: #fff; font-weight: bold; }
  #controls {
    font-size: 11px;
    color: #556;
    text-align: center;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  #msg {
    font-size: 32px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s;
    text-shadow: 0 0 30px rgba(0,0,0,0.9);
    line-height: 1.6;
  }
  #msg.show { opacity: 1; }
  #msg .sub { font-size: 14px; color: #aab; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>KEY <span class="val" id="keyStatus">✗</span></div>
    <div>GRAVITY <span class="val" id="gravDir">▼</span></div>
    <div>FLIPS <span class="val" id="flipCount">0</span></div>
  </div>
  <canvas id="c"></canvas>
  <div id="controls">SPACE or CLICK to flip gravity &nbsp;·&nbsp; R to restart</div>
</div>
<div id="overlay"><div id="msg"></div></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const T = 32; // tile size

// ── Level ──────────────────────────────────────────────────
const LEVEL = [
  'WWWWWWWWWWWWWWWWWWWWWWWWW', // 0  ceiling
  'W.......................W', // 1
  'W.......................W', // 2
  'WWWWW.......WWWWWWWWWWWWW', // 3  door platform + right ceiling
  'W.......................W', // 4
  'W.......................W', // 5
  'W.......................W', // 6
  'W............WWWW.......W', // 7  obstacle
  'W.......................W', // 8
  'W.......................W', // 9
  'W......WWWWW....WWWWWWW.W', // 10 platforms
  'W.......................W', // 11
  'W.......................W', // 12
  'WWWWWWWWWWWWW....WWWWWWWW', // 13 floor with gap
  'WWWWWWWWWWWWWWWWWWWWWWWWW', // 14
];

const COLS = LEVEL[0].length;
const ROWS = LEVEL.length;
canvas.width = COLS * T;
canvas.height = ROWS * T;

// Entities (pixel positions)
const START = { x: 3 * T + 6, y: 13 * T - 24 };
const KEY_POS = { x: 19 * T + T / 2, y: 9 * T + T / 2 };
const DOOR_POS = { x: 2 * T, y: 2 * T };

let tiles;

function parseTiles() {
  tiles = [];
  for (let r = 0; r < ROWS; r++) {
    tiles[r] = [];
    for (let c = 0; c < COLS; c++) {
      tiles[r][c] = LEVEL[r][c] === 'W' ? 1 : 0;
    }
  }
}

function isSolid(px, py) {
  const c = Math.floor(px / T);
  const r = Math.floor(py / T);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true;
  return tiles[r][c] === 1;
}

// ── Player ─────────────────────────────────────────────────
const PW = 20, PH = 24;
const WALK_SPEED = 1.8;
const GRAVITY = 0.35;
const MAX_FALL = 7;

let player, hasKey, gravDir, flipCount, won, dead, frame;

function init() {
  parseTiles();
  player = {
    x: START.x,
    y: START.y,
    vx: WALK_SPEED,
    vy: 0,
    onGround: false,
  };
  hasKey = false;
  gravDir = 1;
  flipCount = 0;
  won = false;
  dead = false;
  frame = 0;
  hideMsg();
  updateHUD();
}

function flipGravity() {
  if (won || dead) return;
  gravDir *= -1;
  player.vy = 0;
  flipCount++;
  updateHUD();
}

// ── Physics ────────────────────────────────────────────────
function updatePlayer() {
  if (won || dead) return;
  frame++;

  // Gravity
  player.vy += GRAVITY * gravDir;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  if (player.vy < -MAX_FALL) player.vy = -MAX_FALL;

  // Move Y
  player.y += player.vy;
  player.onGround = false;

  if (gravDir === 1) {
    // Falling down
    const footY = player.y + PH;
    if (isSolid(player.x + 2, footY) || isSolid(player.x + PW - 3, footY)) {
      player.y = Math.floor(footY / T) * T - PH;
      player.vy = 0;
      player.onGround = true;
    }
    // Head bump
    if (isSolid(player.x + 2, player.y) || isSolid(player.x + PW - 3, player.y)) {
      player.y = Math.floor(player.y / T) * T + T;
      player.vy = 0;
    }
  } else {
    // Falling up
    if (isSolid(player.x + 2, player.y) || isSolid(player.x + PW - 3, player.y)) {
      player.y = Math.floor(player.y / T) * T + T;
      player.vy = 0;
      player.onGround = true;
    }
    // Feet bump
    const footY = player.y + PH;
    if (isSolid(player.x + 2, footY) || isSolid(player.x + PW - 3, footY)) {
      player.y = Math.floor(footY / T) * T - PH;
      player.vy = 0;
    }
  }

  // Move X
  player.x += player.vx;

  if (player.vx > 0) {
    const rightEdge = player.x + PW;
    if (isSolid(rightEdge, player.y + 2) || isSolid(rightEdge, player.y + PH - 3)) {
      player.x = Math.floor(rightEdge / T) * T - PW;
      player.vx = -WALK_SPEED;
    }
  } else {
    if (isSolid(player.x, player.y + 2) || isSolid(player.x, player.y + PH - 3)) {
      player.x = Math.floor(player.x / T) * T + T;
      player.vx = WALK_SPEED;
    }
  }

  // Key pickup
  if (!hasKey) {
    const cx = player.x + PW / 2, cy = player.y + PH / 2;
    if (Math.hypot(cx - KEY_POS.x, cy - KEY_POS.y) < 20) {
      hasKey = true;
      updateHUD();
    }
  }

  // Door check
  if (hasKey) {
    const cx = player.x + PW / 2, cy = player.y + PH / 2;
    if (Math.hypot(cx - (DOOR_POS.x + T / 2), cy - (DOOR_POS.y + T / 2)) < 22) {
      won = true;
      showMsg('LEVEL COMPLETE!', 'Flips: ' + flipCount);
    }
  }

  // Death: fell into the gap (below visible area)
  if (player.y > ROWS * T + 64 || player.y < -64) {
    dead = true;
    showMsg('FELL!', 'Press R to retry');
  }
}

// ── Drawing ────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#0e0e20';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Background grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * T, 0); ctx.lineTo(c * T, ROWS * T); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * T); ctx.lineTo(COLS * T, r * T); ctx.stroke();
  }

  // Tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tiles[r][c] !== 1) continue;
      const x = c * T, y = r * T;

      // Main tile
      ctx.fillStyle = '#2a2a44';
      ctx.fillRect(x, y, T, T);

      // Inner bevel
      ctx.fillStyle = '#363658';
      ctx.fillRect(x + 2, y + 2, T - 4, T - 4);

      // Top-left highlight
      ctx.fillStyle = '#44446a';
      ctx.fillRect(x + 2, y + 2, T - 4, 2);
      ctx.fillRect(x + 2, y + 2, 2, T - 4);

      // Bottom-right shadow
      ctx.fillStyle = '#1e1e36';
      ctx.fillRect(x + 2, y + T - 4, T - 4, 2);
      ctx.fillRect(x + T - 4, y + 2, 2, T - 4);
    }
  }

  // Door
  const dx = DOOR_POS.x, dy = DOOR_POS.y;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(dx + 4, dy + 2, T - 8, T - 2);
  ctx.strokeStyle = hasKey ? '#44ff88' : '#cc4422';
  ctx.lineWidth = 2;
  ctx.strokeRect(dx + 4, dy + 2, T - 8, T - 2);
  // Door arch
  ctx.beginPath();
  ctx.arc(dx + T / 2, dy + 2, (T - 8) / 2, Math.PI, 0);
  ctx.stroke();
  // Handle
  ctx.fillStyle = hasKey ? '#44ff88' : '#ffaa44';
  ctx.beginPath();
  ctx.arc(dx + T - 10, dy + T / 2 + 2, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Key
  if (!hasKey) {
    const kx = KEY_POS.x, ky = KEY_POS.y;
    const bob = Math.sin(frame * 0.05) * 3;
    const glow = 0.4 + Math.sin(frame * 0.08) * 0.2;

    // Glow
    ctx.fillStyle = `rgba(255,204,0,${glow * 0.15})`;
    ctx.beginPath();
    ctx.arc(kx, ky + bob, 14, 0, Math.PI * 2);
    ctx.fill();

    // Key shape
    ctx.fillStyle = '#ffcc00';
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 1;
    // Ring
    ctx.beginPath();
    ctx.arc(kx, ky + bob - 4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#0e0e20';
    ctx.beginPath();
    ctx.arc(kx, ky + bob - 4, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Shaft
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(kx - 1.5, ky + bob + 1, 3, 10);
    // Teeth
    ctx.fillRect(kx + 1.5, ky + bob + 7, 3, 2);
    ctx.fillRect(kx + 1.5, ky + bob + 4, 2, 2);
  }

  // Player
  if (!dead) {
    drawPlayer();
  }

  // Gravity field indicator (particle effect)
  drawGravityParticles();
}

function drawPlayer() {
  const px = player.x, py = player.y;
  const flip = gravDir === -1;
  const dir = player.vx > 0 ? 1 : -1;

  // Shadow/trail when falling
  if (!player.onGround) {
    ctx.fillStyle = 'rgba(68,221,136,0.08)';
    const trailDir = gravDir === 1 ? -1 : 1;
    for (let i = 1; i <= 3; i++) {
      ctx.fillRect(px + 3, py + trailDir * i * 6 + (flip ? 0 : 4), PW - 6, PH - 6);
    }
  }

  // Body
  ctx.fillStyle = '#44dd88';
  roundRect(px + 2, py + (flip ? 2 : 4), PW - 4, PH - 6, 4);

  // Darker body detail
  ctx.fillStyle = '#38cc77';
  roundRect(px + 4, py + (flip ? 4 : 6), PW - 8, PH - 10, 3);

  // Eyes
  const eyeY = flip ? py + PH - 11 : py + 7;
  const blink = Math.sin(frame * 0.03) > 0.97;
  if (!blink) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + PW / 2 - 5 + dir * 2, eyeY, 3, 4);
    ctx.fillRect(px + PW / 2 + 1 + dir * 2, eyeY, 3, 4);
    // Pupils
    ctx.fillStyle = '#222';
    ctx.fillRect(px + PW / 2 - 4 + dir * 3, eyeY + 1, 2, 2);
    ctx.fillRect(px + PW / 2 + 2 + dir * 3, eyeY + 1, 2, 2);
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + PW / 2 - 5 + dir * 2, eyeY + 1, 3, 1);
    ctx.fillRect(px + PW / 2 + 1 + dir * 2, eyeY + 1, 3, 1);
  }

  // Legs (when walking on ground)
  if (player.onGround) {
    const legPhase = Math.sin(frame * 0.18) * 3;
    ctx.fillStyle = '#44dd88';
    if (flip) {
      ctx.fillRect(px + 5 + legPhase, py - 3, 4, 4);
      ctx.fillRect(px + PW - 9 - legPhase, py - 3, 4, 4);
    } else {
      ctx.fillRect(px + 5 + legPhase, py + PH - 1, 4, 4);
      ctx.fillRect(px + PW - 9 - legPhase, py + PH - 1, 4, 4);
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

// Floating particles to show gravity direction
const particles = [];
function drawGravityParticles() {
  // Spawn
  if (frame % 8 === 0 && !won) {
    particles.push({
      x: Math.random() * canvas.width,
      y: gravDir === 1 ? -4 : canvas.height + 4,
      life: 80 + Math.random() * 40,
      age: 0,
    });
  }

  ctx.fillStyle = 'rgba(100,100,180,0.15)';
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.y += gravDir * 1.2;
    p.age++;
    if (p.age > p.life || p.y < -10 || p.y > canvas.height + 10) {
      particles.splice(i, 1);
      continue;
    }
    const alpha = 0.15 * (1 - p.age / p.life);
    ctx.fillStyle = `rgba(100,100,180,${alpha})`;
    ctx.fillRect(p.x, p.y, 2, 2);
  }
}

// ── HUD ────────────────────────────────────────────────────
function updateHUD() {
  const ks = document.getElementById('keyStatus');
  ks.textContent = hasKey ? '✓' : '✗';
  ks.style.color = hasKey ? '#44ff88' : '#ff5555';
  document.getElementById('gravDir').textContent = gravDir === 1 ? '▼' : '▲';
  document.getElementById('flipCount').textContent = flipCount;
}

function showMsg(title, sub) {
  const el = document.getElementById('msg');
  el.innerHTML = title + (sub ? '<div class="sub">' + sub + '</div>' : '');
  el.classList.add('show');
}

function hideMsg() {
  document.getElementById('msg').classList.remove('show');
}

// ── Input ──────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipGravity(); }
  if (e.code === 'KeyR') { init(); }
});
canvas.addEventListener('click', () => flipGravity());
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flipGravity(); }, { passive: false });

// ── Game Loop ──────────────────────────────────────────────
function gameLoop() {
  updatePlayer();
  draw();
  requestAnimationFrame(gameLoop);
}

init();
gameLoop();
</script>
</body>
</html>
