<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>FlipWalker — gravity-flip puzzle</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07090f;
        color: #dfe8ff;
        font-family: "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 3px;
        margin: 10px 0 2px;
        color: #7df9ff;
      }
      p.hint {
        margin: 0 0 10px;
        font-size: 12px;
        color: rgba(223, 232, 255, 0.55);
      }
      canvas {
        max-width: min(96vw, 960px);
        width: 100%;
        height: auto;
        aspect-ratio: 8 / 5;
        image-rendering: auto;
        border-radius: 8px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        touch-action: manipulation;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>FLIPWALKER</h1>
    <p class="hint">
      The walker never stops — flip gravity with SPACE (or tap) to guide it to
      the key, then the door. R restarts.
    </p>
    <canvas id="game"></canvas>
    <script src="game-core.js"></script>
    <script src="main.js"></script>
  </body>
</html>
